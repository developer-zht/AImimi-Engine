name: CI/CD Pipeline

# 触发条件：针对你的两个分支
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '18'

jobs:
  # 作业1: 代码质量检查（所有分支都执行）
  code-quality:
    name: 🔍 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 安装依赖
        run: npm ci

      - name: 🔧 TypeScript 类型检查
        run: npm run type-check

      - name: 🧹 ESLint 代码检查
        run: npm run lint

      - name: 💄 Prettier 格式检查
        run: npm run format:check

  # 作业2: 构建测试（所有分支都执行）
  build:
    name: 🔨 构建测试
    runs-on: ubuntu-latest
    needs: code-quality

    # 根据分支使用不同的构建模式
    strategy:
      matrix:
        include:
          - branch-name: main
            build-mode: production
          - branch-name: dev
            build-mode: development

    # 只在对应分支执行对应的构建
    if: github.ref == format('refs/heads/{0}', matrix.branch-name)

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 安装依赖
        run: npm ci

      - name: 🔨 构建项目 (${{ matrix.build-mode }})
        run: |
          if [ "${{ matrix.build-mode }}" = "production" ]; then
            npm run build
          else
            npm run build:dev
          fi

      - name: 📦 上传构建产物 (仅生产环境)
        if: matrix.build-mode == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: build-files-${{ github.sha }}
          path: dist/
          retention-days: 30

  # 作业3: 开发环境预览 (仅 dev 分支)
  deploy-dev:
    name: 🚧 部署开发预览
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 安装依赖
        run: npm ci

      - name: 🔨 构建开发版本
        run: npm run build:dev

      - name: 📝 生成部署报告
        run: |
          echo "## 🚧 开发环境部署完成" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: dev" >> $GITHUB_STEP_SUMMARY
          echo "- 构建模式: development" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # 作业4: 生产环境部署 (仅 main 分支)
  deploy-production:
    name: 🚀 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    # 生产环境需要特殊权限
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 安装依赖
        run: npm ci

      - name: 🔨 构建生产版本
        run: npm run build

      - name: 🔧 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 作业5: 通知结果
  notify:
    name: 📢 通知结果
    runs-on: ubuntu-latest
    needs: [code-quality, build, deploy-dev, deploy-production]
    if: always()

    steps:
      - name: 📋 生成报告
        run: |
          echo "## 📊 CI/CD 执行报告" >> $GITHUB_STEP_SUMMARY
          echo "### 检查结果" >> $GITHUB_STEP_SUMMARY
          echo "- 代码质量: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 构建测试: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 开发部署: ${{ needs.deploy-dev.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 生产部署: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### 分支信息" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
