# .github/workflows/ci.yaml
name: Code Quality Check

# 只在推送和 PR 时进行代码检查
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '20'

jobs:
  # 代码质量检查（所有分支都执行）
  code-quality:
    name: 🔍 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 安装依赖
        run: npm ci

      - name: 🔧 TypeScript 类型检查
        run: npm run type-check

      - name: 🧹 ESLint 代码检查
        run: npm run lint

      - name: 💄 Prettier 格式检查
        run: npm run format:check

      - name: 📝 生成检查报告
        if: success()
        run: |
          echo "## ✅ 代码质量检查完成" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: 通过" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: 通过" >> $GITHUB_STEP_SUMMARY
          echo "- Prettier: 通过" >> $GITHUB_STEP_SUMMARY
